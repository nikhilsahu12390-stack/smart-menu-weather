<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Atmospheric Menu</title>
    <!-- Tailwind CSS CDN: Instant high-class UI template -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-500 min-h-screen flex flex-col justify-between">

    <!-- Header Section -->
    <header id="app-header" class="p-4 flex justify-between items-center bg-white shadow-sm border-b transition-all">
        <div>
            <h1 class="text-xl font-bold tracking-tight">The Doon Cafe</h1>
            <p class="text-xs text-gray-500">Rajpur Road, Dehradun</p>
        </div>
        <!-- Live Weather Badge -->
        <span id="weather-badge" class="px-3 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 transition-all animate-pulse">
            🔄 Syncing Weather...
        </span>
    </header>

    <!-- Dynamic Hero Banner (Mausam ke hisab se badlega) -->
    <div id="hero-banner" class="m-4 p-6 rounded-2xl bg-gradient-to-r from-gray-700 to-gray-900 text-white shadow-md transition-all duration-500">
        <h2 id="hero-title" class="text-2xl font-black mb-1">Welcome to Doon Cafe</h2>
        <p id="hero-desc" class="text-sm opacity-90">Setting up your local vibe...</p>
    </div>

    <!-- Smart Menu Items Grid -->
    <main class="p-4 flex-grow">
        <h3 class="text-lg font-bold mb-4 px-1">Today's Special Menu</h3>
        <div id="menu-container" class="grid grid-cols-1 gap-4">
            
            <!-- ⏳ Loading Placeholder: Yeh tab tak dikhega jab tak Firestore se data aa raha hai -->
            <div class="text-center py-8 text-gray-400 animate-pulse font-medium text-sm">
                ⏳ Loading fresh menu based on Doon weather...
            </div>

        </div>
    </main>

    <!-- Footer: Instantly open WhatsApp with predefined message -->
    <footer class="p-4 bg-white border-t sticky bottom-0 shadow-lg">
        <button onclick="sendOrder()" class="w-full bg-black text-white font-bold py-3.5 rounded-xl shadow-md hover:scale-[0.98] active:scale-[0.95] transition-all text-center block">
            Order via WhatsApp 💬
        </button>
    </footer>

    <!-- 🔥 FIREBASE CORES & FIRESTORE KICKSTARTERS 🔥 -->
    <!-- Pehle Firebase App load hoga -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Fir Firestore Database load hoga -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Sabse aakhri me tumhari apni script chalegi -->
    <script src="script.js"></script>
</body>
</html>
