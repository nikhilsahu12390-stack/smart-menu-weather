<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Doon Cafe</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Essential CSS for layout without heavy frameworks */
        body { font-family: sans-serif; background-color: #f9fafb; color: #111827; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 1rem; background: white; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        #hero-banner { margin: 1rem; padding: 1.5rem; border-radius: 1rem; background: linear-gradient(to right, #374151, #111827); color: white; }
        main { padding: 1rem; flex-grow: 1; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        footer { padding: 1rem; background: white; border-top: 1px solid #e5e7eb; position: sticky; bottom: 0; }
        button { width: 100%; background: black; color: white; padding: 1rem; border-radius: 0.75rem; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header id="app-header">
        <div>
            <h1 style="font-size: 1.25rem; font-weight: bold;">The Doon Cafe</h1>
            <p style="font-size: 0.75rem; color: #6b7280;">Rajpur Road, Dehradun</p>
        </div>
        <span id="weather-badge">🔄 Syncing...</span>
    </header>

    <div id="hero-banner">
        <h2 id="hero-title" style="font-size: 1.5rem; font-weight: 900;">Welcome to Doon Cafe</h2>
        <p id="hero-desc" style="font-size: 0.875rem; opacity: 0.9;">Setting up your local vibe...</p>
    </div>

    <main>
        <h3 style="font-weight: bold; margin-bottom: 1rem;">Today's Special Menu</h3>
        <div id="menu-container" class="menu-grid">
            <div style="text-align: center; padding: 2rem; color: #9ca3af;">
                ⏳ Loading fresh menu...
            </div>
        </div>
    </main>

    <footer>
        <button onclick="checkout()">Order via WhatsApp 💬</button>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>
</html>
